version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - if [ -d "frontend" ]; then cd frontend; fi && npm ci
    build:
      commands:
        - if [ -d "frontend" ]; then cd frontend; fi && echo "NEXT_PUBLIC_API_URL=https://aromasys-backend.onrender.com/api" >> .env.production && npm run build
  artifacts:
    baseDirectory: frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - frontend/node_modules/**/*
